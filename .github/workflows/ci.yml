name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-cljs:
    name: shadow-cljs node-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.gitlibs
            ~/.m2
          key: ${{ runner.os }}-cljs-${{ hashFiles('package.json', 'deps.edn') }}

      - run: npm install
      - run: npm run test:cljs

  lint:
    name: clj-kondo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:lint
